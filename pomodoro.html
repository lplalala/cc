<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>番茄钟</title>
<style>
  :root {
    --bg: #1a1a2e;
    --card: #16213e;
    --primary: #e94560;
    --primary-hover: #ff6b81;
    --accent: #0f3460;
    --text: #eee;
    --text-muted: #a0a0b0;
    --focus-color: #e94560;
    --short-break-color: #4caf84;
    --long-break-color: #4a9eff;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    user-select: none;
    -webkit-user-select: none;
  }

  .container {
    text-align: center;
    width: 400px;
    padding: 20px;
  }

  h1 {
    font-size: 1.8rem;
    font-weight: 300;
    letter-spacing: 4px;
    margin-bottom: 30px;
    color: var(--text-muted);
  }

  /* Mode tabs */
  .tabs {
    display: flex;
    gap: 4px;
    margin-bottom: 24px;
    background: var(--card);
    border-radius: 40px;
    padding: 4px;
  }

  .tab {
    flex: 1;
    padding: 10px 8px;
    border: none;
    background: transparent;
    color: var(--text-muted);
    font-size: 0.82rem;
    cursor: pointer;
    border-radius: 40px;
    transition: all 0.3s;
    font-family: inherit;
  }

  .tab.active {
    background: var(--accent);
    color: #fff;
    font-weight: 600;
  }

  .tab:hover:not(.active) {
    color: #ccc;
  }

  /* Timer circle */
  .timer-wrapper {
    position: relative;
    width: 300px;
    height: 300px;
    margin: 0 auto 30px;
  }

  .timer-ring {
    transform: rotate(-90deg);
    width: 300px;
    height: 300px;
  }

  .ring-bg {
    fill: none;
    stroke: var(--card);
    stroke-width: 8;
  }

  .ring-progress {
    fill: none;
    stroke: var(--primary);
    stroke-width: 8;
    stroke-linecap: round;
    transition: stroke-dashoffset 0.5s linear;
  }

  .timer-display {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
  }

  .time {
    font-size: 4.5rem;
    font-weight: 200;
    letter-spacing: 2px;
    font-variant-numeric: tabular-nums;
    font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
  }

  .status {
    font-size: 0.85rem;
    color: var(--text-muted);
    letter-spacing: 2px;
    margin-top: 4px;
    text-transform: uppercase;
  }

  /* Controls */
  .controls {
    display: flex;
    gap: 12px;
    justify-content: center;
    margin-bottom: 24px;
  }

  .btn {
    padding: 12px 32px;
    border: none;
    border-radius: 40px;
    font-size: 1rem;
    cursor: pointer;
    font-family: inherit;
    font-weight: 600;
    transition: all 0.25s;
    letter-spacing: 1px;
  }

  .btn:active {
    transform: scale(0.95);
  }

  .btn-start {
    background: var(--primary);
    color: #fff;
    min-width: 140px;
  }

  .btn-start:hover {
    background: var(--primary-hover);
  }

  .btn-start.paused {
    background: #4caf84;
  }

  .btn-reset {
    background: transparent;
    color: var(--text-muted);
    border: 2px solid var(--accent);
  }

  .btn-reset:hover {
    border-color: var(--text-muted);
    color: #fff;
  }

  /* Session counter */
  .sessions {
    color: var(--text-muted);
    font-size: 0.85rem;
    margin-bottom: 16px;
    letter-spacing: 1px;
  }

  .sessions span {
    color: var(--primary);
    font-weight: 700;
    font-size: 1.1rem;
  }

  /* Task input */
  .task-section {
    margin-top: 10px;
  }

  .task-input {
    width: 100%;
    padding: 12px 16px;
    border: 2px solid var(--card);
    border-radius: 40px;
    background: var(--card);
    color: var(--text);
    font-size: 0.95rem;
    font-family: inherit;
    outline: none;
    transition: border-color 0.3s;
  }

  .task-input:focus {
    border-color: var(--accent);
  }

  .task-input::placeholder {
    color: var(--text-muted);
    opacity: 0.6;
  }

  /* 简洁的 footer */
  .footer {
    margin-top: 30px;
    color: var(--text-muted);
    font-size: 0.75rem;
    opacity: 0.5;
  }
</style>
</head>
<body>
<div class="container">
  <h1>番茄钟</h1>

  <div class="tabs">
    <button class="tab active" data-mode="focus">专注 25</button>
    <button class="tab" data-mode="short-break">短休 5</button>
    <button class="tab" data-mode="long-break">长休 15</button>
  </div>

  <div class="timer-wrapper">
    <svg class="timer-ring" viewBox="0 0 300 300">
      <circle class="ring-bg" cx="150" cy="150" r="140" />
      <circle class="ring-progress" cx="150" cy="150" r="140"
              stroke-dasharray="879.6" stroke-dashoffset="0" />
    </svg>
    <div class="timer-display">
      <div class="time" id="timeDisplay">25:00</div>
      <div class="status" id="status">准备开始</div>
    </div>
  </div>

  <div class="controls">
    <button class="btn btn-start" id="btnStart">开始</button>
    <button class="btn btn-reset" id="btnReset">重置</button>
  </div>

  <div class="sessions">
    已完成 <span id="sessionCount">0</span> 个番茄
  </div>

  <div class="task-section">
    <input class="task-input" id="taskInput"
           type="text" placeholder="当前任务..." maxlength="60">
  </div>

  <div class="footer">专注当下，一次一事</div>
</div>

<script>
  const MODES = {
    focus:        { label: '专注',    minutes: 25, color: '#e94560' },
    'short-break':{ label: '短休',    minutes: 5,  color: '#4caf84' },
    'long-break': { label: '长休',    minutes: 15, color: '#4a9eff' },
  };

  const CIRCUMFERENCE = 2 * Math.PI * 140; // ≈ 879.6

  let currentMode = 'focus';
  let totalSeconds = MODES.focus.minutes * 60;
  let remaining = totalSeconds;
  let timerId = null;
  let sessionCount = 0;
  let isRunning = false;

  // DOM refs
  const timeDisplay  = document.getElementById('timeDisplay');
  const statusEl     = document.getElementById('status');
  const btnStart     = document.getElementById('btnStart');
  const btnReset     = document.getElementById('btnReset');
  const sessionEl    = document.getElementById('sessionCount');
  const taskInput    = document.getElementById('taskInput');
  const ringProgress = document.querySelector('.ring-progress');
  const tabs         = document.querySelectorAll('.tab');

  // ── Audio (Web Audio API — no external files) ──
  function playBeep(freq = 880, duration = 180, type = 'sine') {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = type;
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(0.3, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + duration / 1000);
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + duration / 1000);
  }

  function notifyEnd() {
    playBeep(660, 150);
    setTimeout(() => playBeep(880, 150), 180);
    setTimeout(() => playBeep(1100, 300), 360);
  }

  // ── Timer logic ──
  function formatTime(s) {
    const m = Math.floor(s / 60);
    const sec = s % 60;
    return String(m).padStart(2, '0') + ':' + String(sec).padStart(2, '0');
  }

  function updateDisplay() {
    timeDisplay.textContent = formatTime(remaining);
    const elapsed = totalSeconds - remaining;
    const offset = CIRCUMFERENCE * (1 - elapsed / totalSeconds);
    ringProgress.style.strokeDashoffset = String(offset);
    ringProgress.style.stroke = MODES[currentMode].color;
    document.title = formatTime(remaining) + ' — 番茄钟';
  }

  function tick() {
    if (remaining <= 0) {
      finish();
      return;
    }
    remaining--;
    updateDisplay();
  }

  function start() {
    if (isRunning) return;
    isRunning = true;
    statusEl.textContent = MODES[currentMode].label + '中...';
    btnStart.textContent = '暂停';
    btnStart.classList.add('paused');
    timerId = setInterval(tick, 1000);
  }

  function pause() {
    if (!isRunning) return;
    isRunning = false;
    statusEl.textContent = '已暂停';
    btnStart.textContent = '继续';
    btnStart.classList.remove('paused');
    clearInterval(timerId);
    timerId = null;
  }

  function finish() {
    clearInterval(timerId);
    timerId = null;
    isRunning = false;
    remaining = 0;
    updateDisplay();
    notifyEnd();

    if (currentMode === 'focus') {
      sessionCount++;
      sessionEl.textContent = String(sessionCount);
      statusEl.textContent = '完成！休息一下吧';
    } else {
      statusEl.textContent = '休息结束';
    }

    btnStart.textContent = '开始';
    btnStart.classList.remove('paused');
    document.title = '⏰ 时间到！— 番茄钟';

    // 用 Notification API 通知（需用户授权）
    if (Notification.permission === 'granted') {
      const msg = currentMode === 'focus'
        ? '专注完成！休息一下 ☕'
        : '休息结束，继续下一个番茄 🍅';
      new Notification('番茄钟', { body: msg, icon: '🍅' });
    }
  }

  function reset() {
    clearInterval(timerId);
    timerId = null;
    isRunning = false;
    remaining = totalSeconds;
    statusEl.textContent = '准备开始';
    btnStart.textContent = '开始';
    btnStart.classList.remove('paused');
    document.title = '番茄钟';
    updateDisplay();
  }

  function switchMode(mode) {
    if (isRunning) {
      if (!confirm('切换模式会重置当前计时，确定吗？')) return;
    }
    currentMode = mode;
    totalSeconds = MODES[mode].minutes * 60;
    remaining = totalSeconds;
    isRunning = false;
    clearInterval(timerId);
    timerId = null;
    btnStart.textContent = '开始';
    btnStart.classList.remove('paused');
    statusEl.textContent = '准备开始';
    document.title = '番茄钟';

    tabs.forEach(t => t.classList.remove('active'));
    document.querySelector(`[data-mode="${mode}"]`).classList.add('active');
    updateDisplay();
  }

  // ── Events ──
  btnStart.addEventListener('click', () => {
    if (isRunning) { pause(); } else { start(); }
  });

  btnReset.addEventListener('click', () => {
    if (isRunning || remaining < totalSeconds) {
      if (!confirm('确定要重置当前计时吗？')) return;
    }
    reset();
  });

  tabs.forEach(tab => {
    tab.addEventListener('click', () => {
      const mode = tab.dataset.mode;
      if (mode !== currentMode) switchMode(mode);
    });
  });

  // Keyboard shortcuts
  document.addEventListener('keydown', e => {
    if (e.target.tagName === 'INPUT') return;
    if (e.code === 'Space') {
      e.preventDefault();
      isRunning ? pause() : start();
    }
    if (e.code === 'KeyR') reset();
  });

  // Request notification permission on first interaction
  document.addEventListener('click', () => {
    if (Notification.permission === 'default') {
      Notification.requestPermission();
    }
  }, { once: true });

  // Initial render
  updateDisplay();
</script>
</body>
</html>
