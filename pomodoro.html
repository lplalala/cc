<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>番茄钟</title>

<!-- Google Fonts: 优雅衬线体 + 温润无衬线体 -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">

<style>
  :root {
    /* 温润禅意色调 */
    --bg: #faf7f2;
    --card: #fffdf8;
    --card-border: #ede6db;
    --focus-color: #c77826;
    --focus-glow: rgba(199, 120, 38, 0.35);
    --short-break-color: #7a9a7e;
    --short-break-glow: rgba(122, 154, 126, 0.35);
    --long-break-color: #7b9cb5;
    --long-break-glow: rgba(123, 156, 181, 0.35);
    --text: #3d2b1f;
    --text-muted: #8a7b6e;
    --text-soft: #b8a99a;
    --ring-track: #e8e2d8;
    --shadow-sm: 0 1px 3px rgba(61, 43, 31, 0.06);
    --shadow-md: 0 8px 30px rgba(61, 43, 31, 0.08);
    --shadow-lg: 0 20px 60px rgba(61, 43, 31, 0.12);
    --radius: 24px;
    --radius-sm: 14px;
    --transition: 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  /* ── 噪点纹理背景 ── */
  body {
    font-family: 'DM Sans', 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    user-select: none;
    -webkit-user-select: none;
    position: relative;
    overflow-x: hidden;
  }

  /* SVG 噪点叠加层 */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    z-index: 0;
    opacity: 0.028;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E");
    background-repeat: repeat;
    background-size: 256px 256px;
    pointer-events: none;
  }

  /* 柔和的径向光晕 */
  body::after {
    content: '';
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(199,120,38,0.04) 0%, transparent 70%);
    z-index: 0;
    pointer-events: none;
  }

  /* ── 主容器 ── */
  .container {
    position: relative;
    z-index: 1;
    text-align: center;
    width: 420px;
    padding: 40px 32px;
    animation: containerEnter 0.9s cubic-bezier(0.22, 0.61, 0.36, 1) both;
  }

  @keyframes containerEnter {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── 标题 ── */
  .title {
    font-family: 'Cormorant Garamond', 'Georgia', 'Times New Roman', serif;
    font-size: 2.2rem;
    font-weight: 300;
    font-style: italic;
    letter-spacing: 3px;
    color: var(--text-muted);
    margin-bottom: 28px;
    opacity: 0;
    animation: fadeUp 0.7s 0.15s cubic-bezier(0.22, 0.61, 0.36, 1) forwards;
  }

  .title::before { content: '— '; }
  .title::after  { content: ' —'; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── 模式切换 Tab ── */
  .tabs {
    display: flex;
    gap: 8px;
    margin-bottom: 32px;
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: 48px;
    padding: 6px;
    box-shadow: var(--shadow-sm);
    opacity: 0;
    animation: fadeUp 0.7s 0.25s cubic-bezier(0.22, 0.61, 0.36, 1) forwards;
    position: relative;
  }

  .tab {
    flex: 1;
    padding: 12px 10px;
    border: none;
    background: transparent;
    color: var(--text-muted);
    font-size: 0.85rem;
    font-family: 'DM Sans', 'Segoe UI', sans-serif;
    font-weight: 400;
    cursor: pointer;
    border-radius: 44px;
    transition: all 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    position: relative;
    z-index: 1;
    letter-spacing: 0.5px;
    white-space: nowrap;
  }

  .tab.active {
    background: var(--text);
    color: #fff;
    font-weight: 500;
    box-shadow: var(--shadow-md);
  }

  .tab:hover:not(.active) {
    color: var(--text);
    background: rgba(61, 43, 31, 0.04);
  }

  /* ── 计时器区域 ── */
  .timer-wrapper {
    position: relative;
    width: 320px;
    height: 320px;
    margin: 0 auto 32px;
    opacity: 0;
    animation: scaleIn 0.8s 0.35s cubic-bezier(0.22, 0.61, 0.36, 1) forwards;
  }

  @keyframes scaleIn {
    from { opacity: 0; transform: scale(0.88); }
    to   { opacity: 1; transform: scale(1); }
  }

  .timer-ring {
    transform: rotate(-90deg);
    width: 320px;
    height: 320px;
  }

  .ring-bg {
    fill: none;
    stroke: var(--ring-track);
    stroke-width: 7;
  }

  .ring-progress {
    fill: none;
    stroke: var(--focus-color);
    stroke-width: 7;
    stroke-linecap: round;
    transition: stroke-dashoffset 0.5s linear, stroke 0.6s ease;
    filter: drop-shadow(0 0 10px var(--focus-glow));
  }

  /* 计时中的呼吸光晕 */
  .ring-progress.breathing {
    animation: breathe 3s ease-in-out infinite;
  }

  @keyframes breathe {
    0%, 100% { filter: drop-shadow(0 0 8px var(--glow-color, var(--focus-glow))); }
    50%      { filter: drop-shadow(0 0 20px var(--glow-color, var(--focus-glow))); }
  }

  .timer-display {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
  }

  .time {
    font-family: 'Cormorant Garamond', 'Georgia', 'Times New Roman', serif;
    font-size: 5.2rem;
    font-weight: 300;
    letter-spacing: 3px;
    font-variant-numeric: tabular-nums;
    color: var(--text);
    line-height: 1;
  }

  .status {
    font-family: 'DM Sans', 'Segoe UI', sans-serif;
    font-size: 0.8rem;
    font-weight: 400;
    color: var(--text-muted);
    letter-spacing: 3px;
    margin-top: 8px;
    text-transform: uppercase;
    transition: color 0.5s ease;
  }

  /* ── 控制按钮 ── */
  .controls {
    display: flex;
    gap: 14px;
    justify-content: center;
    margin-bottom: 28px;
    opacity: 0;
    animation: fadeUp 0.7s 0.45s cubic-bezier(0.22, 0.61, 0.36, 1) forwards;
  }

  .btn {
    padding: 14px 36px;
    border: none;
    border-radius: 48px;
    font-size: 0.95rem;
    font-family: 'DM Sans', 'Segoe UI', sans-serif;
    font-weight: 500;
    cursor: pointer;
    letter-spacing: 1px;
    transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    position: relative;
    overflow: hidden;
  }

  .btn::after {
    content: '';
    position: absolute;
    inset: 0;
    background: transparent;
    transition: background 0.3s ease;
  }

  .btn:active {
    transform: scale(0.94);
  }

  .btn-start {
    background: var(--text);
    color: #fff;
    min-width: 148px;
    box-shadow: 0 4px 20px rgba(61, 43, 31, 0.2);
  }

  .btn-start:hover {
    box-shadow: 0 6px 28px rgba(61, 43, 31, 0.3);
    transform: translateY(-1px);
  }

  .btn-start.paused {
    background: #7a9a7e;
    color: #fff;
    box-shadow: 0 4px 20px rgba(122, 154, 126, 0.3);
  }

  .btn-start.paused:hover {
    box-shadow: 0 6px 28px rgba(122, 154, 126, 0.4);
  }

  .btn-reset {
    background: transparent;
    color: var(--text-muted);
    border: 1.5px solid var(--card-border);
  }

  .btn-reset:hover {
    border-color: var(--text-muted);
    color: var(--text);
    background: rgba(61, 43, 31, 0.03);
  }

  /* ── 番茄计数（可视化圆点） ── */
  .sessions {
    color: var(--text-muted);
    font-size: 0.82rem;
    margin-bottom: 20px;
    letter-spacing: 1px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    opacity: 0;
    animation: fadeUp 0.7s 0.55s cubic-bezier(0.22, 0.61, 0.36, 1) forwards;
  }

  .sessions-label {
    margin-right: 4px;
  }

  .session-dot {
    display: inline-block;
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: var(--ring-track);
    transition: all 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
  }

  .session-dot.filled {
    background: var(--focus-color);
    box-shadow: 0 0 6px var(--focus-glow);
    animation: dotPop 0.4s cubic-bezier(0.22, 0.61, 0.36, 1);
  }

  @keyframes dotPop {
    0%   { transform: scale(0); }
    60%  { transform: scale(1.5); }
    100% { transform: scale(1); }
  }

  /* ── 任务输入（便签风格） ── */
  .task-section {
    opacity: 0;
    animation: fadeUp 0.7s 0.65s cubic-bezier(0.22, 0.61, 0.36, 1) forwards;
  }

  .task-input {
    width: 100%;
    padding: 14px 20px;
    border: 1.5px solid var(--card-border);
    border-radius: var(--radius-sm);
    background: var(--card);
    color: var(--text);
    font-size: 0.9rem;
    font-family: 'DM Sans', 'Segoe UI', sans-serif;
    font-weight: 400;
    outline: none;
    transition: all 0.3s ease;
    box-shadow: var(--shadow-sm);
    letter-spacing: 0.3px;
  }

  .task-input:focus {
    border-color: var(--focus-color);
    box-shadow: 0 0 0 4px rgba(199, 120, 38, 0.08);
  }

  .task-input::placeholder {
    color: var(--text-soft);
    font-style: italic;
    opacity: 0.7;
  }

  /* ── Footer ── */
  .footer {
    margin-top: 32px;
    font-family: 'Cormorant Garamond', 'Georgia', serif;
    font-size: 0.85rem;
    font-style: italic;
    color: var(--text-soft);
    opacity: 0;
    animation: fadeUp 0.7s 0.75s cubic-bezier(0.22, 0.61, 0.36, 1) forwards;
    letter-spacing: 1.5px;
  }
</style>
</head>
<body>

<div class="container">
  <h1 class="title">番茄钟</h1>

  <!-- 模式切换 -->
  <div class="tabs" id="tabs">
    <button class="tab active" data-mode="focus">专注 · 25</button>
    <button class="tab" data-mode="short-break">短休 · 5</button>
    <button class="tab" data-mode="long-break">长休 · 15</button>
  </div>

  <!-- 计时器 -->
  <div class="timer-wrapper">
    <svg class="timer-ring" viewBox="0 0 320 320">
      <circle class="ring-bg" cx="160" cy="160" r="150" />
      <circle class="ring-progress" cx="160" cy="160" r="150"
              stroke-dasharray="942.48" stroke-dashoffset="0" />
    </svg>
    <div class="timer-display">
      <div class="time" id="timeDisplay">25:00</div>
      <div class="status" id="status">准备开始</div>
    </div>
  </div>

  <!-- 控制按钮 -->
  <div class="controls">
    <button class="btn btn-start" id="btnStart">开始</button>
    <button class="btn btn-reset" id="btnReset">重置</button>
  </div>

  <!-- 番茄计数 -->
  <div class="sessions" id="sessionsRow">
    <span class="sessions-label">今日番茄</span>
    <!-- JS 动态生成圆点 -->
  </div>

  <!-- 任务输入 -->
  <div class="task-section">
    <input class="task-input" id="taskInput"
           type="text" placeholder="写下此刻要做的事…" maxlength="60">
  </div>

  <div class="footer">静下心来，一次只做一件事</div>
</div>

<script>
  const MODES = {
    focus:        { label: '专注', minutes: 25, color: '#c77826', glow: 'rgba(199,120,38,0.35)' },
    'short-break':{ label: '短休', minutes: 5,  color: '#7a9a7e', glow: 'rgba(122,154,126,0.35)' },
    'long-break': { label: '长休', minutes: 15, color: '#7b9cb5', glow: 'rgba(123,156,181,0.35)' },
  };

  const CIRCUMFERENCE = 2 * Math.PI * 150; // ≈ 942.48
  const MAX_DOTS = 12; // 最多显示 12 个番茄圆点

  let currentMode = 'focus';
  let totalSeconds = MODES.focus.minutes * 60;
  let remaining = totalSeconds;
  let timerId = null;
  let sessionCount = 0;
  let isRunning = false;

  // DOM refs
  const timeDisplay  = document.getElementById('timeDisplay');
  const statusEl     = document.getElementById('status');
  const btnStart     = document.getElementById('btnStart');
  const btnReset     = document.getElementById('btnReset');
  const sessionsRow  = document.getElementById('sessionsRow');
  const taskInput    = document.getElementById('taskInput');
  const ringProgress = document.querySelector('.ring-progress');
  const tabs         = document.querySelectorAll('.tab');
  const tabsContainer = document.getElementById('tabs');

  // ── 番茄圆点渲染 ──
  function renderDots() {
    // 保留 label
    let html = '<span class="sessions-label">今日番茄</span>';
    for (let i = 0; i < MAX_DOTS; i++) {
      const filled = i < sessionCount ? ' filled' : '';
      html += `<span class="session-dot${filled}"></span>`;
    }
    sessionsRow.innerHTML = html;
  }

  // ── Audio（更柔和的禅意音色 — 类似颂钵/木鱼） ──
  function playBeep(freq = 528, duration = 200, type = 'sine') {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = type;
    osc.frequency.value = freq;
    // 柔和的音量包络
    gain.gain.setValueAtTime(0.2, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration / 1000);
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + duration / 1000);
  }

  function notifyEnd() {
    // 三声柔和的颂钵式音调（低频→中频，温暖不刺耳）
    playBeep(396, 260, 'sine');  // 根音
    setTimeout(() => playBeep(528, 260, 'sine'), 280);  // 五度
    setTimeout(() => playBeep(660, 400, 'sine'), 560);  // 纯五度
  }

  // ── Timer logic ──
  function formatTime(s) {
    const m = Math.floor(s / 60);
    const sec = s % 60;
    return String(m).padStart(2, '0') + ':' + String(sec).padStart(2, '0');
  }

  function updateDisplay() {
    timeDisplay.textContent = formatTime(remaining);
    const elapsed = totalSeconds - remaining;
    const offset = CIRCUMFERENCE * (1 - elapsed / totalSeconds);
    ringProgress.style.strokeDashoffset = String(offset);
    ringProgress.style.stroke = MODES[currentMode].color;
    ringProgress.style.setProperty('--glow-color', MODES[currentMode].glow);
    document.title = formatTime(remaining) + ' — 番茄钟';
  }

  function tick() {
    if (remaining <= 0) {
      finish();
      return;
    }
    remaining--;
    updateDisplay();
  }

  function start() {
    if (isRunning) return;
    isRunning = true;
    statusEl.textContent = MODES[currentMode].label + '中…';
    btnStart.textContent = '暂停';
    btnStart.classList.add('paused');
    ringProgress.classList.add('breathing');
    timerId = setInterval(tick, 1000);
  }

  function pause() {
    if (!isRunning) return;
    isRunning = false;
    statusEl.textContent = '已暂停';
    btnStart.textContent = '继续';
    btnStart.classList.remove('paused');
    ringProgress.classList.remove('breathing');
    clearInterval(timerId);
    timerId = null;
  }

  function finish() {
    clearInterval(timerId);
    timerId = null;
    isRunning = false;
    remaining = 0;
    updateDisplay();
    notifyEnd();
    ringProgress.classList.remove('breathing');

    // 完成闪烁效果
    ringProgress.style.filter = 'drop-shadow(0 0 30px ' + MODES[currentMode].glow + ')';
    setTimeout(() => {
      ringProgress.style.filter = '';
    }, 600);

    if (currentMode === 'focus') {
      sessionCount = Math.min(sessionCount + 1, MAX_DOTS);
      renderDots();
      statusEl.textContent = '完成！休息一下吧';
    } else {
      statusEl.textContent = '休息结束';
    }

    btnStart.textContent = '开始';
    btnStart.classList.remove('paused');
    document.title = '⏰ 时间到！— 番茄钟';

    // Notification API
    if (Notification.permission === 'granted') {
      const msg = currentMode === 'focus'
        ? '专注完成！休息一下 ☕'
        : '休息结束，继续下一个番茄 🍅';
      new Notification('番茄钟', { body: msg, icon: '🍅' });
    }
  }

  function reset() {
    clearInterval(timerId);
    timerId = null;
    isRunning = false;
    remaining = totalSeconds;
    statusEl.textContent = '准备开始';
    btnStart.textContent = '开始';
    btnStart.classList.remove('paused');
    ringProgress.classList.remove('breathing');
    document.title = '番茄钟';
    updateDisplay();
  }

  function switchMode(mode) {
    if (isRunning) {
      if (!confirm('切换模式会重置当前计时，确定吗？')) return;
    }
    currentMode = mode;
    totalSeconds = MODES[mode].minutes * 60;
    remaining = totalSeconds;
    isRunning = false;
    clearInterval(timerId);
    timerId = null;
    btnStart.textContent = '开始';
    btnStart.classList.remove('paused');
    ringProgress.classList.remove('breathing');
    statusEl.textContent = '准备开始';
    document.title = '番茄钟';

    tabs.forEach(t => t.classList.remove('active'));
    const activeTab = document.querySelector(`[data-mode="${mode}"]`);
    if (activeTab) activeTab.classList.add('active');

    updateDisplay();
  }

  // ── Events ──
  btnStart.addEventListener('click', () => {
    if (isRunning) { pause(); } else { start(); }
  });

  btnReset.addEventListener('click', () => {
    if (isRunning || remaining < totalSeconds) {
      if (!confirm('确定要重置当前计时吗？')) return;
    }
    reset();
  });

  tabsContainer.addEventListener('click', (e) => {
    const tab = e.target.closest('.tab');
    if (!tab) return;
    const mode = tab.dataset.mode;
    if (mode && mode !== currentMode) switchMode(mode);
  });

  // Keyboard shortcuts
  document.addEventListener('keydown', e => {
    if (e.target.tagName === 'INPUT') return;
    if (e.code === 'Space') {
      e.preventDefault();
      isRunning ? pause() : start();
    }
    if (e.code === 'KeyR') reset();
  });

  // Request notification permission on first interaction
  document.addEventListener('click', () => {
    if (Notification.permission === 'default') {
      Notification.requestPermission();
    }
  }, { once: true });

  // ── 初始化 ──
  renderDots();
  updateDisplay();
</script>
</body>
</html>
